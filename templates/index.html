<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>AI Chatbot</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --bg-hover: #2d2d2d;
            --primary: #bb86fc;
            --primary-variant: #3700b3;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 280px; background-color: var(--bg-panel); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        #sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        #new-chat-btn { background-color: transparent; border: 1px solid var(--text-muted); color: var(--text-main); padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        #new-chat-btn:hover { background-color: var(--bg-hover); }
        #session-list { flex: 1; overflow-y: auto; padding: 10px; }
        .session-item { padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .session-item:hover, .session-item.active { background-color: var(--bg-hover); }
        .session-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; font-size: 14px;}
        
        /* Settings / Memory */
        #settings-area { padding: 15px; border-top: 1px solid var(--border-color); font-size: 13px; }
        #settings-area input { width: 100%; padding: 8px; margin-top: 5px; background: var(--bg-dark); border: 1px solid var(--border-color); color: white; border-radius: 4px;}
        
        /* Main Chat Area */
        #main-chat { flex: 1; display: flex; flex-direction: column; background-color: var(--bg-dark); }
        #chat-header { padding: 20px; border-bottom: 1px solid var(--border-color); font-weight: bold; display: flex; justify-content: space-between; align-items: center;}
        
        /* Message Area */
        #message-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .message { display: flex; flex-direction: column; max-width: 80%; }
        .msg-user { align-self: flex-end; background-color: #2b5278; padding: 12px 16px; border-radius: 16px 16px 0 16px; }
        .msg-model { align-self: flex-start; background-color: var(--bg-panel); padding: 12px 16px; border-radius: 16px 16px 16px 0; border: 1px solid var(--border-color); line-height: 1.5; white-space: pre-wrap;}
        .msg-attachment { max-width: 200px; border-radius: 8px; margin-top: 8px; border: 1px solid #555;}
        
        .msg-controls { display: flex; gap: 10px; margin-top: 8px; font-size: 12px; }
        .msg-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 0; }
        .msg-btn:hover { color: var(--primary); }

        /* Input Area */
        #input-area { padding: 20px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; background-color: var(--bg-panel);}
        #preview-area { display: none; }
        #preview-img { height: 60px; border-radius: 4px; }
        #input-row { display: flex; gap: 10px; align-items: flex-end; }
        #msg-input { flex: 1; min-height: 50px; max-height: 200px; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background-color: var(--bg-dark); color: white; resize: none; font-size: 15px;}
        #msg-input:focus { outline: none; border-color: var(--primary); }
        .icon-btn { width: 50px; height: 50px; border-radius: 8px; border: none; cursor: pointer; font-size: 18px; display: flex; justify-content: center; align-items: center; transition: 0.2s;}
        
        #upload-btn { background-color: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border-color);}
        #upload-btn:hover { background-color: #2b2b2b; }
        #send-btn { background-color: var(--primary); color: white; }
        #send-btn:hover { background-color: #a46fee; }
        #stop-btn { background-color: #cf6679; color: white; display: none; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="sidebar-header">
            <span>歷史對話</span>
            <button id="new-chat-btn">+ 新增</button>
        </div>
        <div id="session-list"></div>
        <div id="settings-area">
            <div>💡 記憶機制 (常駐偏好)：</div>
            <input type="text" id="pref-input" placeholder="例如：請用繁體中文且輕鬆的口吻回覆" onblur="savePreference()">
        </div>
    </div>

    <div id="main-chat">
        <div id="chat-header">
            <span id="current-chat-title">New Chat</span>
        </div>
        
        <div id="message-area"></div>

        <div id="input-area">
            <div id="preview-area">
                <img id="preview-img" src="" alt="preview">
                <button class="msg-btn" onclick="clearAttachment()" style="vertical-align: top;">❌</button>
            </div>
            <div id="input-row">
                <button id="upload-btn" class="icon-btn" onclick="document.getElementById('file-input').click()">📎</button>
                <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
                <textarea id="msg-input" placeholder="輸入訊息... (Shift+Enter 換行, Enter 發送)"></textarea>
                <button id="send-btn" class="icon-btn" onclick="sendMessage()">➤</button>
                <button id="stop-btn" class="icon-btn" onclick="stopGeneration()">⏹</button>
            </div>
        </div>
    </div>

<script>
    let currentSessionId = null;
    let abortController = null;

    // init
    window.onload = async () => {
        await fetchPreferences();
        await refreshSessionList();
        if (currentSessionId) {
            loadMessages(currentSessionId);
        }
    };

    async function fetchPreferences() {
        const res = await fetch("/preferences");
        const data = await res.json();
        if (data && data["custom_instruction"]) {
            document.getElementById("pref-input").value = data["custom_instruction"];
        }
    }

    async function savePreference() {
        const val = document.getElementById("pref-input").value;
        const formData = new FormData();
        formData.append("key", "custom_instruction");
        formData.append("value", val);
        await fetch("/preferences", { method: "POST", body: formData });
    }

    async function refreshSessionList() {
        const res = await fetch("/sessions");
        const sessions = await res.json();
        const listDiv = document.getElementById("session-list");
        listDiv.innerHTML = "";
        
        if (sessions.length === 0) {
            await createNewSession();
            return;
        }

        sessions.forEach(s => {
            const div = document.createElement("div");
            div.className = "session-item" + (s.id === currentSessionId ? " active" : "");
            div.innerHTML = `<span class="session-title">${escapeHTML(s.title)}</span>`;
            div.onclick = () => switchSession(s.id, s.title);
            listDiv.appendChild(div);
        });

        if (!currentSessionId && sessions.length > 0) {
            switchSession(sessions[0].id, sessions[0].title);
        }
    }

    async function createNewSession() {
        const res = await fetch("/sessions", { method: "POST" });
        const data = await res.json();
        await refreshSessionList();
        switchSession(data.id, data.title);
    }

    document.getElementById("new-chat-btn").onclick = createNewSession;

    function switchSession(id, title) {
        currentSessionId = id;
        document.getElementById("current-chat-title").textContent = title;
        document.querySelectorAll(".session-item").forEach(el => el.classList.remove("active"));
        event?.currentTarget?.classList.add("active");
        
        // 重新獲得所有 sessions 來確保高亮正確
        loadMessages(id);
    }

    async function loadMessages(sessionId) {
        const msgArea = document.getElementById("message-area");
        msgArea.innerHTML = "";
        const res = await fetch(`/sessions/${sessionId}/messages`);
        const messages = await res.json();
        
        messages.forEach(m => {
            appendMessageToUI(m.role, m.content, m.has_attachment, false);
        });
        scrollToBottom();
    }

    function appendMessageToUI(role, content, has_attachment, isStreamingNode = false) {
        const msgArea = document.getElementById("message-area");
        const div = document.createElement("div");
        div.className = `message msg-${role}`;
        
        let htmlCnt = escapeHTML(content);
        if (has_attachment) htmlCnt += `<br><div style="font-size:12px; color:#aaa;">[附帶檔案]</div>`;
        
        div.innerHTML = `<div>${htmlCnt}</div>`;
        if (role === 'model' && !isStreamingNode) {
            div.innerHTML += `<div class="msg-controls"><button class="msg-btn" onclick="regenerateLast()">🔄 重新生成</button></div>`;
        }
        
        if (isStreamingNode) {
            div.id = "streaming-msg";
        }
        
        msgArea.appendChild(div);
        scrollToBottom();
        return div;
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, tag => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
        }[tag]));
    }

    function scrollToBottom() {
        const area = document.getElementById("message-area");
        area.scrollTop = area.scrollHeight;
    }

    // 上傳檔案處理
    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById("preview-img").src = e.target.result;
                document.getElementById("preview-area").style.display = "block";
            }
            reader.readAsDataURL(file);
        }
    }

    function clearAttachment() {
        document.getElementById("file-input").value = "";
        document.getElementById("preview-area").style.display = "none";
    }

    // 發送訊息
    document.getElementById("msg-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    async function sendMessage() {
        if (!currentSessionId) return;
        const msgInput = document.getElementById("msg-input");
        const fileInput = document.getElementById("file-input");
        const messageText = msgInput.value.trim();
        const file = fileInput.files[0];
        
        if (!messageText && !file) return;

        // UI 處理
        msgInput.value = "";
        clearAttachment();
        appendMessageToUI('user', messageText || "[傳送了檔案]", file != null);

        const formData = new FormData();
        formData.append("message", messageText);
        if (file) formData.append("file", file);

        document.getElementById("send-btn").style.display = "none";
        document.getElementById("stop-btn").style.display = "flex";

        abortController = new AbortController();

        try {
            const response = await fetch(`/chat/${currentSessionId}`, {
                method: "POST",
                body: formData,
                signal: abortController.signal
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            
            const streamNode = appendMessageToUI('model', '', false, true);
            const textDiv = streamNode.querySelector("div");
            
            let fullText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunkStr = decoder.decode(value, {stream: true});
                const lines = chunkStr.split("\n\n");
                
                for (let line of lines) {
                    if (line.startsWith("data: ")) {
                        const dataStr = line.substring(6);
                        if (dataStr === "[DONE]") break;
                        try {
                            const data = JSON.parse(dataStr);
                            if (data.chunk) {
                                fullText += data.chunk;
                                textDiv.innerHTML = escapeHTML(fullText);
                                scrollToBottom();
                            }
                            if (data.error) {
                                fullText += "\\n[錯誤: " + data.error + "]";
                                textDiv.innerHTML = escapeHTML(fullText);
                            }
                        } catch (e) {}
                    }
                }
            }
            // 結束後加上重新生成按鈕
            streamNode.removeAttribute("id");
            streamNode.innerHTML += `<div class="msg-controls"><button class="msg-btn" onclick="regenerateLast()">🔄 重新生成</button></div>`;

        } catch (error) {
            if (error.name === 'AbortError') {
                const streamNode = document.getElementById("streaming-msg");
                if (streamNode) {
                    streamNode.removeAttribute("id");
                    streamNode.innerHTML += `<div><br><i>[已由使用者中止]</i></div>`;
                    streamNode.innerHTML += `<div class="msg-controls"><button class="msg-btn" onclick="regenerateLast()">🔄 重新生成</button></div>`;
                }
            }
        } finally {
            document.getElementById("send-btn").style.display = "flex";
            document.getElementById("stop-btn").style.display = "none";
            refreshSessionList(); // 更新標題
        }
    }

    function stopGeneration() {
        if (abortController) {
            abortController.abort();
        }
    }

    async function regenerateLast() {
        if (!currentSessionId) return;
        if (!confirm("確定要刪除上一個 AI 回覆並重新生成嗎？(這將會觸發一次空的請求)")) return;
        
        await fetch(`/regenerate/${currentSessionId}`, { method: "POST" });
        loadMessages(currentSessionId);
        
        // 觸發一次重新生成 (模擬重新輸入空字串，因為我們在後端有用歷史做上下文)
        const msgInput = document.getElementById("msg-input");
        msgInput.value = "請換個方式重新回答剛才的問題";
        sendMessage();
    }

</script>
</body>
</html>
